<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="PositiveNews logo">
  <!-- Rays: 8 rounded pills, rotated around center -->
  <rect x="15" y="1.5" width="2" height="5" rx="1" fill="#c76a1a" transform="rotate(0 16 16)"/>
  <rect x="15" y="1.5" width="2" height="5" rx="1" fill="#c76a1a" transform="rotate(45 16 16)"/>
  <rect x="15" y="1.5" width="2" height="5" rx="1" fill="#c76a1a" transform="rotate(90 16 16)"/>
  <rect x="15" y="1.5" width="2" height="5" rx="1" fill="#c76a1a" transform="rotate(135 16 16)"/>
  <rect x="15" y="1.5" width="2" height="5" rx="1" fill="#c76a1a" transform="rotate(180 16 16)"/>
  <rect x="15" y="1.5" width="2" height="5" rx="1" fill="#c76a1a" transform="rotate(225 16 16)"/>
  <rect x="15" y="1.5" width="2" height="5" rx="1" fill="#c76a1a" transform="rotate(270 16 16)"/>
  <rect x="15" y="1.5" width="2" height="5" rx="1" fill="#c76a1a" transform="rotate(315 16 16)"/>
  <!-- Central circle -->
  <circle cx="16" cy="16" r="6.5" fill="#c76a1a"/>
</svg>
