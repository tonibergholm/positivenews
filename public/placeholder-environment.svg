<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" fill="url(#bg)"/>

  <!-- Rolling hills -->
  <ellipse cx="200" cy="420" rx="280" ry="90" fill="#6ee7b7" opacity="0.3"/>
  <ellipse cx="600" cy="430" rx="300" ry="80" fill="#34d399" opacity="0.25"/>
  <ellipse cx="400" cy="440" rx="450" ry="70" fill="#10b981" opacity="0.2"/>

  <!-- Sun rays -->
  <g transform="translate(680,80)" stroke="#6ee7b7" stroke-width="2" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="-45"/>
    <line x1="0" y1="0" x2="32" y2="-32"/>
    <line x1="0" y1="0" x2="45" y2="0"/>
    <line x1="0" y1="0" x2="32" y2="32"/>
    <line x1="0" y1="0" x2="-32" y2="-32"/>
    <line x1="0" y1="0" x2="-45" y2="0"/>
    <line x1="0" y1="0" x2="-32" y2="32"/>
    <line x1="0" y1="0" x2="0" y2="45"/>
  </g>
  <circle cx="680" cy="80" r="22" fill="#34d399" opacity="0.75"/>

  <!-- Main tree trunk -->
  <rect x="385" y="280" width="30" height="90" rx="6" fill="url(#trunk)" opacity="0.85"/>

  <!-- Tree canopy — layered circles -->
  <circle cx="400" cy="220" r="80" fill="#10b981" opacity="0.85"/>
  <circle cx="340" cy="250" r="55" fill="#059669" opacity="0.75"/>
  <circle cx="460" cy="245" r="55" fill="#059669" opacity="0.75"/>
  <circle cx="400" cy="165" r="55" fill="#34d399" opacity="0.8"/>

  <!-- Small leaf accents -->
  <g fill="#6ee7b7" opacity="0.55">
    <ellipse cx="130" cy="200" rx="18" ry="10" transform="rotate(-30,130,200)"/>
    <ellipse cx="155" cy="220" rx="14" ry="8" transform="rotate(20,155,220)"/>
    <ellipse cx="650" cy="310" rx="20" ry="11" transform="rotate(25,650,310)"/>
    <ellipse cx="625" cy="330" rx="15" ry="8" transform="rotate(-15,625,330)"/>
  </g>

  <!-- Floating dots (seeds) -->
  <g fill="#059669" opacity="0.4">
    <circle cx="200" cy="140" r="4"/><circle cx="220" cy="115" r="3"/>
    <circle cx="580" cy="160" r="4"/><circle cx="600" cy="135" r="3"/>
    <circle cx="100" cy="300" r="3"/><circle cx="720" cy="200" r="3"/>
  </g>

  <!-- Label -->
  <text x="400" y="398" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#065f46" text-anchor="middle" opacity="0.7">Environment</text>
</svg>
